    <title>Boosts Scared — Наши social media</title>

    <style>
        :root {
            --bg-color: #0b0c10;
            --card-bg: #1f2833;
            --neon-blue: #00f0ff;
            --accent-color: #ff007f;
            --white: #ffffff;
            
            /* Цвета соцсетей */
            --discord-color: #5865F2;
            --instagram-color: #E1306C;
            --tiktok-color: #000000;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--white);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            position: relative; /* Нужно для правильного позиционирования копирайта */
        }

        /* Главный контейнер-визитка */
        .profile-container {
            background-color: var(--card-bg);
            width: 100%;
            max-width: 480px;
            padding: 40px 30px;
            border-radius: 24px;
            text-align: center;
            border: 2px solid rgba(255, 0, 127, 0.3);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.7), 0 0 20px rgba(255, 0, 127, 0.1);
        }

        /* Твоя аватарка из папки */
        .avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            margin: 0 auto 20px;
            object-fit: cover;
            border: 3px solid var(--neon-blue);
            box-shadow: 0 0 20px rgba(0, 240, 255, 0.5);
            display: block;
        }

        h1 {
            font-size: 2.2rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
            text-shadow: 0 0 8px var(--accent-color);
        }

        .description {
            color: #8f9aa7;
            font-size: 1.1rem;
            margin-bottom: 35px;
        }

        /* Список кнопок */
        .social-links {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .btn-social {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px; /* Расстояние между иконкой и текстом */
            color: var(--white);
            text-decoration: none;
            padding: 16px;
            border-radius: 12px;
            font-weight: bold;
            font-size: 1.1rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: all 0.3s ease;
            border: 1px solid transparent;
        }

        /* Стилизация SVG-иконок внутри кнопок */
        .btn-social svg {
            width: 24px;
            height: 24px;
            fill: currentColor;
        }

        /* Стили для каждой кнопки */
        .btn-social.discord {
            background-color: var(--discord-color);
        }
        .btn-social.discord:hover {
            background-color: #4351b5;
            transform: translateY(-3px);
            box-shadow: 0 5px 20px rgba(88, 101, 242, 0.4);
        }

        .btn-social.instagram {
            background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
        }
        .btn-social.instagram:hover {
            opacity: 0.95;
            transform: translateY(-3px);
            box-shadow: 0 5px 20px rgba(225, 48, 108, 0.4);
        }

        .btn-social.tiktok {
            background-color: var(--tiktok-color);
            border: 1px solid #25f4ee;
        }
        .btn-social.tiktok:hover {
            background-color: #111;
            transform: translateY(-3px);
            box-shadow: 0 5px 20px rgba(37, 244, 238, 0.4);
        }

        /* Фиксированная подпись в правом нижнем углу */
        .copyright {
            position: fixed;
            bottom: 20px;
            right: 20px;
            font-size: 0.9rem;
            color: #626d7a;
            letter-spacing: 1px;
            font-weight: 500;
            text-transform: uppercase;
            transition: color 0.3s ease;
            user-select: none; /* Чтобы текст случайно не выделялся мышкой */
        }

        /* Небольшой интерактив при наведении на автора */
        .copyright:hover {
            color: var(--neon-blue);
            text-shadow: 0 0 8px var(--neon-blue);
        }

        /* Стили для мобильных устройств, чтобы текст не наезжал на карточку */
        @media (max-width: 600px) {
            .copyright {
                position: static;
                margin-top: 30px;
                display: block;
                text-align: center;
            }
            body {
                flex-direction: column;
                justify-content: center;
            }
        }
    </style>
</head>
